<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
</head>
<style>
    .product-card {
        width: 100px;
        height: auto;
        border: 10px solid black;
        border-radius: 15px;
        padding: 100px;
        margin: 20px auto;

    }
    .product-card img{
        max-width: 200%;
        min-width: 100%;
        height: 120px;
        object-fit: cover;
    }
    .product-card h1 {
        margin: 10px 0;
    }
    .product-card p{
        padding: 6px;
    }
</style>
<body>
    <div class="product-card">
        <img src="https://www.mystore.in/s/62ea2c599d1398fa16dbae0a/g/6a3d29c9fda9292db532b9f8/f7b2382e-d492-4915-a130-caf399feb508-640x640.jpg" alt="smart watch">
        <h1>Smart Watch</h1>
        <p>Smart watch is a stylish and modern watch.
            It helps you track your fitness activities,
            Monitor your health and stay connected.
        </p>
    </div>
</body>
</html>
